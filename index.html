<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        /* Global & Reset Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            overflow: hidden; /* Lock scroll during loading */
        }

        /* --- 1. DEVDEPTH TERMINAL PRELOADER STYLE --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .terminal-box {
            width: 90%;
            max-width: 600px;
            font-family: 'Courier New', Courier, monospace;
            background: #141414;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .terminal-text {
            color: #a8ffb2; /* Terminal green text style */
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #a8ffb2;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* --- 2. GAEUL MINIMALIST PORTFOLIO LAYOUT --- */
        #main-site {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease;
            height: 100vh;
            overflow-y: auto;
            background-color: #ffffff; /* Gaeul light minimal aesthetic */
            color: #111111;
        }

        .gaeul-layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 120px;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #000;
        }

        .hero-section {
            margin-bottom: 100px;
        }

        .hero-section h1 {
            font-size: 48px;
            font-weight: 300;
            line-height: 1.3;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .hero-section p {
            font-size: 18px;
            color: #666;
            max-width: 600px;
            line-height: 1.6;
        }

        /* Minimal Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 60px;
        }

        .project-card {
            background: #f9f9f9;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .project-card span {
            font-size: 16px;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .project-grid { grid-template-columns: 1fr; }
            .hero-section h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <!-- 1. DevDepth Preloader Screen -->
    <div id="preloader">
        <div class="terminal-box">
            <div class="terminal-header">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <span class="terminal-text" id="typewriter"></span><span class="cursor"></span>
        </div>
    </div>

    <!-- 2. Gaeul Main Layout -->
    <div id="main-site">
        <div class="gaeul-layout">
            <header class="nav-header">
                <div class="logo">SAMPOWERED</div>
                <nav class="nav-links">
                    <a href="#">Work</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </nav>
            </header>

            <main>
                <section class="hero-section">
                    <h1>Hi, I'm Sam.<br>Creating digital projects with minimalistic design execution.</h1>
                    <p>Focused on simple interfaces, code clarity, and reliable back-end performance architectures.</p>
                </section>

                <hr style="border: 0; border-top: 1px solid #eee;">

                <section class="project-grid">
                    <div class="project-card"><span>Project One</span></div>
                    <div class="project-card"><span>Project Two</span></div>
                    <div class="project-card"><span>Project Three</span></div>
                    <div class="project-card"><span>Project Four</span></div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // Text configurations mimicking DevDepth console sequence
        const systemLines = [
            "Initializing secure system environment...\n",
            "Loading modules and configuration layers...\n",
            "Establishing host network parameters...\n",
            "Success! Redirecting to clean canvas..."
        ];

        const textContainer = document.getElementById("typewriter");
        let lineIndex = 0;
        let charIndex = 0;

        function typeConsoleEffect() {
            if (lineIndex < systemLines.length) {
                let currentLine = systemLines[lineIndex];
                
                if (charIndex < currentLine.length) {
                    textContainer.textContent += currentLine.charAt(charIndex);
                    charIndex++;
                    // Custom speed variables per character type logic
                    setTimeout(typeConsoleEffect, Math.random() * 20 + 15);
                } else {
                    lineIndex++;
                    charIndex = 0;
                    // Pause briefly before running the next text string line block
                    setTimeout(typeConsoleEffect, 400);
                }
            } else {
                // Clear out loading elements and trigger Gaeul layout
                setTimeout(revealMainSite, 600);
            }
        }

        function revealMainSite() {
            const preloader = document.getElementById("preloader");
            const mainSite = document.getElementById("main-site");

            // Smooth transition drop slide effect out
            preloader.style.opacity = "0";
            preloader.style.transform = "translateY(-100vh)";
            
            // Allow user browser to interactively scroll inside clean aesthetic page layout
            document.body.style.overflow = "auto";
            
            mainSite.style.visibility = "visible";
            mainSite.style.opacity = "1";

            // Safely delete preloader element tree container out of memory completely 
            setTimeout(() => preloader.remove(), 800);
        }

        // Initialize script sequence execution on load loop
        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(typeConsoleEffect, 300);
        });
    </script>
</body>
</html>
