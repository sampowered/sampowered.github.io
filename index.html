<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaeul | Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0d;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .terminal-window {
            width: 100%;
            max-width: 650px;
            background-color: #151515;
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }
        .terminal-header {
            background-color: #222;
            padding: 10px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        .buttons {
            display: flex;
            gap: 6px;
            margin-right: 15px;
        }
        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .btn-close { background-color: #ff5f56; }
        .btn-minimize { background-color: #ffbd2e; }
        .btn-maximize { background-color: #27c93f; }
        .title {
            color: #888;
            font-size: 12px;
            flex-grow: 1;
            text-align: center;
            margin-right: 50px; /* Balance out the button spacing */
        }
        .terminal-body {
            padding: 25px;
            font-size: 16px;
            line-height: 1.6;
            min-height: 200px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 17px;
            background-color: #00ff66;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 49% { background-color: #00ff66; }
            50%, 100% { background-color: transparent; }
        }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="buttons">
            <div class="btn btn-close"></div>
            <div class="btn btn-minimize"></div>
            <div class="btn btn-maximize"></div>
        </div>
        <div class="title">visitor@gaeul:~</div>
    </div>
    <div class="terminal-body">
        <span id="output"></span><span class="cursor"></span>
    </div>
</div>

<script>
    const textToType = "Welcome to my space.\n> Loading core assets...\n> Identity confirmed: Gaeul\n> Status: Online and ready.";
    let index = 0;

    function typingEffect() {
        if (index < textToType.length) {
            let char = textToType.charAt(index);
            // Convert newline characters into proper HTML breaks
            if (char === "\n") {
                document.getElementById('output').innerHTML += "<br>";
            } else {
                document.getElementById('output').innerHTML += char;
            }
            index++;
            setTimeout(typingEffect, 60); // Speed of the typing animation
        }
    }

    // Start typing once page finishes loading
    window.onload = typingEffect;
</script>

</body>
</html>
